---

- name: Multi-task project setup
  hosts: all
  connection: local
  gather_facts: false
  tasks:
    - name: Create project directory
      file:
        path: /tmp/myproject
        state: directory
    
    - name: Create README.md
      copy:
        dest: /tmp/myproject/README.md
        content: |
          # My Project
          Managed by Ansible
    
    - name: Create config.txt
      copy:
        dest: /tmp/myproject/config.txt
        content: "version=1.0"
    
    - name: Print completion message
      debug:
        msg: "Project setup complete"
